name: "Setup Environment"
description: Setup the environment for compiling the solution
runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: actions/upload-artifact@v3
    - uses: dAppServer/wails-build-action@v2.2
      with:
        go-version: "1.24"
