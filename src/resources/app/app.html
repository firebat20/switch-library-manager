<html>
  <head>
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" type="text/css" href="app.css" />
    <link href="lib/css/tabulator/tabulator.min.css" rel="stylesheet" />
    <link href="lib/css/dark/toggle-bootstrap.min.css" rel="stylesheet" />
    <link href="lib/css/dark/toggle-bootstrap-dark.min.css" rel="stylesheet" />
    <link
      href="lib/css/tabulator/semantic-ui/tabulator_semantic-ui.min.css"
      rel="stylesheet"
    />
    <script
      type="text/javascript"
      src="lib/js/jquery/jquery-3.5.1.min.js"
      onload="window.$ = window.jQuery = module.exports;"
    ></script>
    <script type="text/javascript" src="lib/js/moment/moment.min.js"></script>
    <script
      type="text/javascript"
      src="lib/js/tabulator/tabulator.min.js"
    ></script>
    <script
      type="text/javascript"
      src="lib/js/jsrender/jsrender.min.js"
    ></script>
    <script type="text/javascript" src="app.js"></script>
  </head>

  <body class="bootstrap">
    <div class="wrapper">
      <ul id="tab_btns" class="tabs clearfix" data-tabgroup="tab-group">
        <li><a href="#library" class="active">Library</a></li>
        <li class="missing_btn"><a href="#missing">Missing games</a></li>
        <li><a href="#updates">Missing updates</a></li>
        <li><a href="#dlc">Missing DLC</a></li>
        <li><a href="#status">Issues</a></li>
        <li><a href="#settings">Settings</a></li>
        <!-- Add Dark Mode Toggle and Rescan Buttons -->
        <li style="position: absolute; right: 24px; display: flex; gap: 4px;">
          <a href="#" id="btn-rescan" title="Rescan Library" style="padding: 6px 10px; font-size: 16px; border-bottom: none !important;">🔄</a>
          <a href="#" id="btn-hard-rescan" title="Hard Rescan (Clear Cache & Deep Scan)" style="padding: 6px 10px; font-size: 16px; border-bottom: none !important;">🗑️</a>
          <a href="#" id="toggle-dark-mode" title="Toggle Dark Mode" style="padding: 6px 10px; font-size: 16px; border-bottom: none !important;">🌙</a>
        </li>
      </ul>
      <div class="progress-container" style="display:none;">
        <div class="progress-modal">
          <h5 class="progress-type">Loading...</h5>
          <div class="progress">
            <div
              class="progress-bar"
              role="progressbar"
              aria-valuenow=""
              aria-valuemin="0"
              aria-valuemax="100"
            ></div>
          </div>
          <div class="progress-msg"></div>
        </div>
      </div>
      <section id="tab-group" class="tabgroup">
        <div id="library"></div>
        <div id="updates"></div>
        <div id="missing"></div>
        <div id="dlc"></div>
        <div id="status"></div>
        <div id="settings"></div>
      </section>
    </div>

    <script id="settingsTemplate" type="text/x-jsrender">
      <form id="settings-form" class="fluent-form">
        <h3 class="fluent-heading">General</h3>
        <div class="form-row">
            <label>Library Folder</label>
            <div style="display:flex; gap:8px;">
                <input type="text" class="form-control" name="folder" value="{{:settings.folder}}" readonly style="flex:1; background-color: rgba(0,0,0,0.02) !important;">
                <button type="button" class="btn btn-outline-primary folder-set">Change</button>
            </div>
        </div>
        <div class="form-row">
            <label>Prod.keys Path</label>
            <input type="text" class="form-control" name="prod_keys" value="{{:settings.prod_keys}}" placeholder="Path to prod.keys file">
        </div>
        <div class="form-row">
            <label>Items per Page</label>
            <select class="form-control" name="gui_page_size">
                <option value="50" {{if settings.gui_page_size == 50}}selected{{/if}}>50 rows</option>
                <option value="100" {{if settings.gui_page_size == 100}}selected{{/if}}>100 rows</option>
                <option value="200" {{if settings.gui_page_size == 200}}selected{{/if}}>200 rows</option>
                <option value="500" {{if settings.gui_page_size == 500}}selected{{/if}}>500 rows</option>
            </select>
        </div>
        <div class="form-row checkbox-row">
            <input type="checkbox" id="scan_recursively" name="scan_recursively" {{if settings.scan_recursively}}checked{{/if}}>
            <label for="scan_recursively">Scan folders recursively</label>
        </div>
        <div class="form-row checkbox-row">
            <input type="checkbox" id="debug" name="debug" {{if settings.debug}}checked{{/if}}>
            <label for="debug">Enable Debug Logging</label>
        </div>

        <h3 class="fluent-heading">Missing Content Tracking</h3>
        <div class="form-row checkbox-row">
            <input type="checkbox" id="check_for_missing_updates" name="check_for_missing_updates" {{if settings.check_for_missing_updates}}checked{{/if}}>
            <label for="check_for_missing_updates">Check for missing updates</label>
        </div>
        <div class="form-row checkbox-row">
            <input type="checkbox" id="check_for_missing_dlc" name="check_for_missing_dlc" {{if settings.check_for_missing_dlc}}checked{{/if}}>
            <label for="check_for_missing_dlc">Check for missing DLC</label>
        </div>
        <div class="form-row checkbox-row">
            <input type="checkbox" id="hide_missing_games" name="hide_missing_games" {{if settings.hide_missing_games}}checked{{/if}}>
            <label for="hide_missing_games">Hide missing games from lists completely</label>
        </div>
        <div class="form-row checkbox-row">
            <input type="checkbox" id="hide_demo_games" name="hide_demo_games" {{if settings.hide_demo_games}}checked{{/if}}>
            <label for="hide_demo_games">Hide demo games</label>
        </div>
        <div class="form-row checkbox-row">
            <input type="checkbox" id="ignore_dlc_updates" name="ignore_dlc_updates" {{if settings.ignore_dlc_updates}}checked{{/if}}>
            <label for="ignore_dlc_updates">Ignore DLC updates</label>
        </div>

        <h3 class="fluent-heading">Database URLs</h3>
        <div class="form-row">
            <label>Titles JSON URL</label>
            <input type="text" class="form-control" name="titles_json_url" value="{{:settings.titles_json_url}}">
        </div>
        <div class="form-row">
            <label>Versions JSON URL</label>
            <input type="text" class="form-control" name="versions_json_url" value="{{:settings.versions_json_url}}">
        </div>

        <h3 class="fluent-heading">Ignore Lists</h3>
        <div class="form-row">
            <label>Ignore File Types (Comma-separated)</label>
            <input type="text" class="form-control" name="ignore_file_types" value="{{if settings.ignore_file_types}}{{:settings.ignore_file_types.join(',')}}{{/if}}" placeholder="e.g. .txt, .pdf">
        </div>
        <div class="form-row">
            <label>Ignore Update Title IDs (One per line)</label>
            <textarea class="form-control" name="ignore_update_title_ids" rows="4" placeholder="0100000000000000&#10;0100000000000800">{{if settings.ignore_update_title_ids}}{{:settings.ignore_update_title_ids.join('\n')}}{{/if}}</textarea>
        </div>
        <div class="form-row">
            <label>Ignore DLC Title IDs (One per line)</label>
            <textarea class="form-control" name="ignore_dlc_title_ids" rows="4" placeholder="0100000000000001&#10;0100000000000002">{{if settings.ignore_dlc_title_ids}}{{:settings.ignore_dlc_title_ids.join('\n')}}{{/if}}</textarea>
        </div>

        <div style="margin-top: 32px; display:flex; justify-content: flex-end;">
            <button type="submit" class="btn btn-primary">Save Settings</button>
        </div>
      </form>
    </script>

    <script id="missingTemplate" type="text/x-jsrender">
      {{if folder}}
          {{if missingGames && missingGames.length}}
              <div class="alert alert-warning" role="alert">
                  <div class="alert-icon">⚠️</div>
                  <div class="alert-content">There are <strong>{{:missingGames.length}}</strong> games missing in your local library:</div>
                  <div class="alert-actions">
                      <button type="button" class="btn btn-outline-primary export-btn">Export CSV</button>
                  </div>
              </div>
              <section id="missingGames-table" class="content"></section>
          {{else}}
              <div class="alert alert-success" role="alert">
                  <div class="alert-icon">✅</div>
                  <div class="alert-content">You have all the games, you are not missing any Games!</div>
              </div>
          {{/if}}
      {{else}}
          <div class="alert alert-warning" role="alert">
              <div class="alert-icon">ℹ️</div>
              <div class="alert-content">Local games folder is not set, please set the folder to get started</div>
              <div class="alert-actions">
                  <button type="button" class="btn btn-primary folder-set">Set Folder</button>
              </div>
          </div>
      {{/if}}
    </script>

    <script id="libraryTemplate" type="text/x-jsrender">
      {{if folder}}
          {{if library && library.length}}
              <div class="alert alert-info" role="alert">
                  <div class="alert-icon">ℹ️</div>
                  <div class="alert-content">
                    Selected folder: <strong>{{:folder}}</strong> 
                    {{if scanFolders && scanFolders.length}}(and {{:scanFolders.length}} additional folders){{/if}}
                  </div>
                  <div class="alert-actions">
                    <button type="button" class="btn btn-success library-organize-action">Organize Library</button>
                    <button type="button" class="btn btn-outline-primary folder-set">Change</button>
                    <button type="button" class="btn btn-outline-primary folder-set">Add</button>
                    <button type="button" class="btn btn-link export-btn">Export CSV</button>
                  </div>
              </div>
              {{if keys === "false"}}
              <div id="missingkeys" class="alert alert-danger" role="alert" >
                  <div class="alert-icon">❌</div>
                  <div class="alert-content"><strong>Prod.keys was not found.</strong> Deep NSP scan is disabled, library content is based on file names tags.</div>
                  <button type="button" class="fluent-close-btn" onClick='$("#missingkeys").hide()'>&times;</button>
              </div>
              {{/if}}
              {{if num_skipped != 0}}
                   <div id="scan_issues" class="alert alert-warning" role="alert">
                      <div class="alert-icon">⚠️</div>
                      <div class="alert-content"><strong>{{:num_skipped}}</strong> out of {{:num_files}} files were skipped during scan, click on the issues tab to learn more</div>
                      <button type="button" class="fluent-close-btn" onClick='$("#scan_issues").hide()'>&times;</button>
                    </div>
              {{/if}}
              <section id="library-table" class="content"></section>
          {{else}}
              <div class="alert alert-warning" role="alert">
                  <div class="alert-icon">⚠️</div>
                  <div class="alert-content">
                  {{if num_skipped != 0}}
                      <strong>{{:num_skipped}}</strong> out of {{:num_files}} files were skipped during scan, click on the issues tab to learn more
                  {{else}}
                      The selected folder (<strong>{{:folder}}</strong>) is empty. Please set a different folder.
                  {{/if}}
                  </div>
                  <div class="alert-actions">
                      <button type="button" class="btn btn-primary folder-set">Set Folder</button>
                  </div>
              </div>
              {{if !keys}}
              <div id="missingkeys" class="alert alert-danger" role="alert" >
                  <div class="alert-icon">❌</div>
                  <div class="alert-content"><strong>Prod.keys was not found.</strong> Analysing NSP is disabled, library content is based on file names only</div>
              </div>
              {{/if}}
          {{/if}}
      {{else}}
          <div class="alert alert-warning" role="alert">
              <div class="alert-icon">ℹ️</div>
              <div class="alert-content">Local games folder is not set, please set the folder to get started</div>
              <div class="alert-actions">
                  <button type="button" class="btn btn-primary folder-set">Set Folder</button>
              </div>
          </div>
              {{if !keys}}
              <div id="missingkeys" class="alert alert-danger" role="alert" >
                  <div class="alert-icon">❌</div>
                  <div class="alert-content"><strong>Prod.keys was not found.</strong> Deep games scan is disabled, the library content is based only on file name tags</div>
              </div>
              {{/if}}
      {{/if}}
    </script>

    <script id="updatesTemplate" type="text/x-jsrender">
      {{if folder}}
          {{if updates && updates.length}}
              <div class="alert alert-warning" role="alert">
                  <div class="alert-icon">⚠️</div>
                  <div class="alert-content">There are <strong>{{:updates.length}}</strong> games/DLC with missing updates:</div>
                  <div class="alert-actions">
                      <button type="button" class="btn btn-outline-primary export-btn">Export CSV</button>
                  </div>
              </div>
              <section id="updates-table" class="content"></section>
          {{else}}
              <div class="alert alert-success" role="alert">
                  <div class="alert-icon">✅</div>
                  <div class="alert-content">All games are up to date, you are not missing any updates!</div>
              </div>
          {{/if}}
      {{else}}
          <div class="alert alert-warning" role="alert">
              <div class="alert-icon">ℹ️</div>
              <div class="alert-content">Local games folder is not set, please set the folder to get started</div>
              <div class="alert-actions">
                  <button type="button" class="btn btn-primary folder-set">Set Folder</button>
              </div>
          </div>
      {{/if}}
    </script>

    <script id="dlcTemplate" type="text/x-jsrender">
      {{if folder}}
           {{if dlc && dlc.length}}
               <div class="alert alert-warning" role="alert">
                   <div class="alert-icon">⚠️</div>
                   <div class="alert-content">There are <strong>{{:dlc.length}}</strong> games with missing DLC's in your local library:</div>
                   <div class="alert-actions">
                       <button type="button" class="btn btn-outline-primary export-btn">Export CSV</button>
                   </div>
               </div>
               <section id="dlc-table" class="content"></section>
           {{else}}
               <div class="alert alert-success" role="alert">
                   <div class="alert-icon">✅</div>
                   <div class="alert-content">All games are up to date, you are not missing any DLC's!</div>
               </div>
           {{/if}}
       {{else}}
           <div class="alert alert-warning" role="alert">
               <div class="alert-icon">ℹ️</div>
               <div class="alert-content">Local games folder is not set, please set the folder to get started</div>
               <div class="alert-actions">
                   <button type="button" class="btn btn-primary folder-set">Set Folder</button>
               </div>
           </div>
       {{/if}}
    </script>

    <script id="statusTemplate" type="text/x-jsrender">
      {{if folder}}
           {{if library && library.length}}
               <div class="alert alert-warning" role="alert">
                   <div class="alert-icon">⚠️</div>
                   <div class="alert-content"><strong>{{:library.length}}</strong> files were skipped during scan, additional details below:</div>
                   <div class="alert-actions">
                       <button type="button" class="btn btn-success library-organize-action">Organize & Fix</button>
                       <button type="button" class="btn btn-outline-primary export-btn">Export CSV</button>
                   </div>
               </div>
               <section id="status-table" class="content"></section>
           {{else}}
               <div class="alert alert-success" role="alert">
                   <div class="alert-icon">✅</div>
                   <div class="alert-content">No issues found</div>
               </div>
           {{/if}}
       {{else}}
           <div class="alert alert-warning" role="alert">
               <div class="alert-icon">ℹ️</div>
               <div class="alert-content">Local games folder is not set, please set the folder to get started</div>
               <div class="alert-actions">
                   <button type="button" class="btn btn-primary folder-set">Set Folder</button>
               </div>
           </div>
       {{/if}}
    </script>

    <script id="organizeTemplate" type="text/x-jsrender">
      {{if folder}}
       <div class="alert alert-info" role="alert">
           <div class="alert-icon">ℹ️</div>
           <div class="alert-content">
               Configure your organization settings below and click 'Organize Library' to save and apply them.
           </div>
       </div>
       
       <form id="organize-form" class="fluent-form">
          <h3 class="fluent-heading">Organization Rules</h3>
          
          <div class="form-row checkbox-row">
            <input type="checkbox" id="create_folder_per_game" name="create_folder_per_game" {{if settings.organize_options.create_folder_per_game}}checked{{/if}}>
            <label for="create_folder_per_game">Create a folder per game</label>
          </div>
          <div class="form-row" style="margin-left: 32px;">
            <label>Folder Name Template</label>
            <input type="text" class="form-control" name="folder_name_template" value="{{:settings.organize_options.folder_name_template}}">
          </div>
          
          <div class="form-row checkbox-row" style="margin-top: 16px;">
            <input type="checkbox" id="rename_files" name="rename_files" {{if settings.organize_options.rename_files}}checked{{/if}}>
            <label for="rename_files">Rename files to standard format</label>
          </div>
          <div class="form-row" style="margin-left: 32px;">
            <label>File Name Template</label>
            <input type="text" class="form-control" name="file_name_template" value="{{:settings.organize_options.file_name_template}}">
          </div>

          <h3 class="fluent-heading">Folder Structure</h3>
          <div class="form-row">
            <label>Updates Folder Name (Optional)</label>
            <input type="text" class="form-control" name="updates_folder" value="{{:settings.organize_options.updates_folder}}" placeholder="Leave blank to mix with base games">
          </div>
          <div class="form-row">
            <label>DLC Folder Name (Optional)</label>
            <input type="text" class="form-control" name="dlc_folder" value="{{:settings.organize_options.dlc_folder}}" placeholder="Leave blank to mix with base games">
          </div>

          <h3 class="fluent-heading">Cleanup & Advanced</h3>
          <div class="form-row checkbox-row">
            <input type="checkbox" id="delete_empty_folders" name="delete_empty_folders" {{if settings.organize_options.delete_empty_folders}}checked{{/if}}>
            <label for="delete_empty_folders">Delete empty folders after organizing</label>
          </div>
          <div class="form-row checkbox-row">
            <input type="checkbox" id="delete_old_update_files" name="delete_old_update_files" {{if settings.organize_options.delete_old_update_files}}checked{{/if}}>
            <label for="delete_old_update_files">Delete old update files</label>
          </div>
          <div class="form-row checkbox-row">
            <input type="checkbox" id="prioritize_compressed" name="prioritize_compressed" {{if settings.organize_options.prioritize_compressed}}checked{{/if}}>
            <label for="prioritize_compressed">Prioritize compressed files (Keep .xcz/.nsz over duplicates)</label>
          </div>
          <div class="form-row checkbox-row">
            <input type="checkbox" id="process_when_missing_base_game" name="process_when_missing_base_game" {{if settings.organize_options.process_when_missing_base_game}}checked{{/if}}>
            <label for="process_when_missing_base_game">Process updates/DLC even if base game is missing</label>
          </div>
          <div class="form-row checkbox-row">
            <input type="checkbox" id="switch_safe_file_names" name="switch_safe_file_names" {{if settings.organize_options.switch_safe_file_names}}checked{{/if}}>
            <label for="switch_safe_file_names">Use Switch-safe file/folder names (Strip special characters)</label>
          </div>
          
          <div style="margin-top: 32px; display:flex; justify-content: flex-end;">
            <button type="submit" class="btn btn-primary">Save & Organize Library</button>
          </div>
       </form>
      {{else}}
          <div class="alert alert-warning" role="alert">
              <div class="alert-icon">ℹ️</div>
              <div class="alert-content">Local games folder is not set, please set the folder to get started</div>
              <div class="alert-actions">
                  <button type="button" class="btn btn-primary folder-set">Set Folder</button>
              </div>
          </div>
      {{/if}}
    </script>
  </body>
</html>
