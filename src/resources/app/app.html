<html>
  <head>
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" type="text/css" href="app.css" />
    <link href="lib/css/tabulator/tabulator.min.css" rel="stylesheet" />
    <link href="lib/css/dark/toggle-bootstrap.min.css" rel="stylesheet" />
    <link href="lib/css/dark/toggle-bootstrap-dark.min.css" rel="stylesheet" />
    <link
      href="lib/css/tabulator/semantic-ui/tabulator_semantic-ui.min.css"
      rel="stylesheet"
    />
    <script
      type="text/javascript"
      src="lib/js/jquery/jquery-3.5.1.min.js"
      onload="window.$ = window.jQuery = module.exports;"
    ></script>
    <script type="text/javascript" src="lib/js/moment/moment.min.js"></script>
    <script
      type="text/javascript"
      src="lib/js/tabulator/tabulator.min.js"
    ></script>
    <script
      type="text/javascript"
      src="lib/js/jsrender/jsrender.min.js"
    ></script>
    <script type="text/javascript" src="app.js"></script>
  </head>

  <body class="bootstrap">
    <div class="wrapper">
      <ul id="tab_btns" class="tabs clearfix" data-tabgroup="tab-group">
        <li><a href="#library" class="active">Library</a></li>
        <li class="missing_btn"><a href="#missing">Missing games</a></li>
        <li><a href="#updates">Missing updates</a></li>
        <li><a href="#dlc">Missing DLC</a></li>
        <li><a href="#organize">Organize</a></li>
        <li><a href="#status">Issues</a></li>
        <li><a href="#settings">Settings</a></li>
        <!-- Add Dark Mode Toggle and Rescan Buttons -->
        <li style="position: absolute; right: 24px; display: flex; gap: 4px;">
          <a href="#" id="btn-rescan" title="Rescan Library" style="padding: 6px 10px; font-size: 16px; border-bottom: none !important;">🔄</a>
          <a href="#" id="btn-hard-rescan" title="Hard Rescan (Clear Cache)" style="padding: 6px 10px; font-size: 16px; border-bottom: none !important;">🗑️</a>
          <a href="#" id="toggle-dark-mode" title="Toggle Dark Mode" style="padding: 6px 10px; font-size: 16px; border-bottom: none !important;">🌙</a>
        </li>
      </ul>
      <div class="progress-container" style="display:none;">
        <div class="progress-modal">
          <h5 class="progress-type">Loading...</h5>
          <div class="progress">
            <div
              class="progress-bar"
              role="progressbar"
              aria-valuenow=""
              aria-valuemin="0"
              aria-valuemax="100"
            ></div>
          </div>
          <div class="progress-msg"></div>
        </div>
      </div>
      <section id="tab-group" class="tabgroup">
        <div id="library"></div>
        <div id="updates"></div>
        <div id="missing"></div>
        <div id="dlc"></div>
        <div id="organize"></div>
        <div id="status"></div>
        <div id="settings"></div>
      </section>
    </div>

    <script id="settingsTemplate" type="text/x-jsrender">
      <div class="alert alert-success" role="alert">
          <div class="alert-icon">✅</div>
          <div class="alert-content">You can edit the settings by modifying the settings.json file, and reloading the app.</div>
      </div>
      <pre><code class="settings-json">{{:code}}</code></pre>
    </script>

    <script id="missingTemplate" type="text/x-jsrender">
      {{if folder}}
          {{if missingGames && missingGames.length}}
              <div class="alert alert-warning" role="alert">
                  <div class="alert-icon">⚠️</div>
                  <div class="alert-content">There are <strong>{{:missingGames.length}}</strong> games missing in your local library:</div>
                  <div class="alert-actions">
                      <button type="button" class="btn btn-outline-primary export-btn">Export CSV</button>
                  </div>
              </div>
              <section id="missingGames-table" class="content"></section>
          {{else}}
              <div class="alert alert-success" role="alert">
                  <div class="alert-icon">✅</div>
                  <div class="alert-content">You have all the games, you are not missing any Games!</div>
              </div>
          {{/if}}
      {{else}}
          <div class="alert alert-warning" role="alert">
              <div class="alert-icon">ℹ️</div>
              <div class="alert-content">Local games folder is not set, please set the folder to get started</div>
              <div class="alert-actions">
                  <button type="button" class="btn btn-primary folder-set">Set Folder</button>
              </div>
          </div>
      {{/if}}
    </script>

    <script id="libraryTemplate" type="text/x-jsrender">
      {{if folder}}
          {{if library && library.length}}
              <div class="alert alert-info" role="alert">
                  <div class="alert-icon">ℹ️</div>
                  <div class="alert-content">
                    Selected folder: <strong>{{:folder}}</strong> 
                    {{if scanFolders && scanFolders.length}}(and {{:scanFolders.length}} additional folders){{/if}}
                  </div>
                  <div class="alert-actions">
                    <button type="button" class="btn btn-outline-primary folder-set">Change</button>
                    <button type="button" class="btn btn-outline-primary folder-set">Add</button>
                    <button type="button" class="btn btn-link export-btn">Export CSV</button>
                  </div>
              </div>
              {{if keys === "false"}}
              <div id="missingkeys" class="alert alert-danger" role="alert" >
                  <div class="alert-icon">❌</div>
                  <div class="alert-content"><strong>Prod.keys was not found.</strong> Deep NSP scan is disabled, library content is based on file names tags.</div>
                  <button type="button" class="fluent-close-btn" onClick='$("#missingkeys").hide()'>&times;</button>
              </div>
              {{/if}}
              {{if num_skipped != 0}}
                   <div id="scan_issues" class="alert alert-warning" role="alert">
                      <div class="alert-icon">⚠️</div>
                      <div class="alert-content"><strong>{{:num_skipped}}</strong> out of {{:num_files}} files were skipped during scan, click on the issues tab to learn more</div>
                      <button type="button" class="fluent-close-btn" onClick='$("#scan_issues").hide()'>&times;</button>
                    </div>
              {{/if}}
              <section id="library-table" class="content"></section>
          {{else}}
              <div class="alert alert-warning" role="alert">
                  <div class="alert-icon">⚠️</div>
                  <div class="alert-content">
                  {{if num_skipped != 0}}
                      <strong>{{:num_skipped}}</strong> out of {{:num_files}} files were skipped during scan, click on the issues tab to learn more
                  {{else}}
                      The selected folder (<strong>{{:folder}}</strong>) is empty. Please set a different folder.
                  {{/if}}
                  </div>
                  <div class="alert-actions">
                      <button type="button" class="btn btn-primary folder-set">Set Folder</button>
                  </div>
              </div>
              {{if !keys}}
              <div id="missingkeys" class="alert alert-danger" role="alert" >
                  <div class="alert-icon">❌</div>
                  <div class="alert-content"><strong>Prod.keys was not found.</strong> Analysing NSP is disabled, library content is based on file names only</div>
              </div>
              {{/if}}
          {{/if}}
      {{else}}
          <div class="alert alert-warning" role="alert">
              <div class="alert-icon">ℹ️</div>
              <div class="alert-content">Local games folder is not set, please set the folder to get started</div>
              <div class="alert-actions">
                  <button type="button" class="btn btn-primary folder-set">Set Folder</button>
              </div>
          </div>
              {{if !keys}}
              <div id="missingkeys" class="alert alert-danger" role="alert" >
                  <div class="alert-icon">❌</div>
                  <div class="alert-content"><strong>Prod.keys was not found.</strong> Deep games scan is disabled, the library content is based only on file name tags</div>
              </div>
              {{/if}}
      {{/if}}
    </script>

    <script id="updatesTemplate" type="text/x-jsrender">
      {{if folder}}
          {{if updates && updates.length}}
              <div class="alert alert-warning" role="alert">
                  <div class="alert-icon">⚠️</div>
                  <div class="alert-content">There are <strong>{{:updates.length}}</strong> games/DLC with missing updates:</div>
                  <div class="alert-actions">
                      <button type="button" class="btn btn-outline-primary export-btn">Export CSV</button>
                  </div>
              </div>
              <section id="updates-table" class="content"></section>
          {{else}}
              <div class="alert alert-success" role="alert">
                  <div class="alert-icon">✅</div>
                  <div class="alert-content">All games are up to date, you are not missing any updates!</div>
              </div>
          {{/if}}
      {{else}}
          <div class="alert alert-warning" role="alert">
              <div class="alert-icon">ℹ️</div>
              <div class="alert-content">Local games folder is not set, please set the folder to get started</div>
              <div class="alert-actions">
                  <button type="button" class="btn btn-primary folder-set">Set Folder</button>
              </div>
          </div>
      {{/if}}
    </script>

    <script id="dlcTemplate" type="text/x-jsrender">
      {{if folder}}
           {{if dlc && dlc.length}}
               <div class="alert alert-warning" role="alert">
                   <div class="alert-icon">⚠️</div>
                   <div class="alert-content">There are <strong>{{:dlc.length}}</strong> games with missing DLC's in your local library:</div>
                   <div class="alert-actions">
                       <button type="button" class="btn btn-outline-primary export-btn">Export CSV</button>
                   </div>
               </div>
               <section id="dlc-table" class="content"></section>
           {{else}}
               <div class="alert alert-success" role="alert">
                   <div class="alert-icon">✅</div>
                   <div class="alert-content">All games are up to date, you are not missing any DLC's!</div>
               </div>
           {{/if}}
       {{else}}
           <div class="alert alert-warning" role="alert">
               <div class="alert-icon">ℹ️</div>
               <div class="alert-content">Local games folder is not set, please set the folder to get started</div>
               <div class="alert-actions">
                   <button type="button" class="btn btn-primary folder-set">Set Folder</button>
               </div>
           </div>
       {{/if}}
    </script>

    <script id="statusTemplate" type="text/x-jsrender">
      {{if folder}}
           {{if library && library.length}}
               <div class="alert alert-warning" role="alert">
                   <div class="alert-icon">⚠️</div>
                   <div class="alert-content"><strong>{{:library.length}}</strong> files were skipped during scan, additional details below:</div>
                   <div class="alert-actions">
                       <button type="button" class="btn btn-outline-primary export-btn">Export CSV</button>
                   </div>
               </div>
               <section id="status-table" class="content"></section>
           {{else}}
               <div class="alert alert-success" role="alert">
                   <div class="alert-icon">✅</div>
                   <div class="alert-content">No issues found</div>
               </div>
           {{/if}}
       {{else}}
           <div class="alert alert-warning" role="alert">
               <div class="alert-icon">ℹ️</div>
               <div class="alert-content">Local games folder is not set, please set the folder to get started</div>
               <div class="alert-actions">
                   <button type="button" class="btn btn-primary folder-set">Set Folder</button>
               </div>
           </div>
       {{/if}}
    </script>

    <script id="organizeTemplate" type="text/x-jsrender">
      {{if folder}}
       <div class="alert alert-info" role="alert">
           <div class="alert-icon">ℹ️</div>
           <div class="alert-content">
               You can automatically organize your library into a folder per game structure, 
               or just rename the files to a standard way. The options below can be customized through the settings.json file.
           </div>
       </div>
       <div class="container">
          <form>
              <div class="form-group row">
                <label for="baseFolder" class="col-sm-2 col-form-label">Base folder</label>
                <div class="col-sm-10">
                  <input type="text" readonly class="form-control-plaintext" id="baseFolder" value="{{:folder}}">
                </div>
              </div>
              <div class="form-group row">
                <label for="createFolders" class="col-sm-2 col-form-label">Create folders</label>
                <div class="col-sm-10">
                  <input type="text" readonly class="form-control-plaintext" id="createFolders" value="{{:settings.organize_options.create_folder_per_game}}">
                </div>
              </div>
              <div class="form-group row">
                <label for="createFolders" class="col-sm-2 col-form-label">Create Updates folders</label>
                <div class="col-sm-10">
                  <input type="text" readonly class="form-control-plaintext" id="createFolders" value="{{:settings.organize_options.updates_folder}}">
                </div>
              </div>
              <div class="form-group row">
                <label for="createFolders" class="col-sm-2 col-form-label">Create DLC folders</label>
                <div class="col-sm-10">
                  <input type="text" readonly class="form-control-plaintext" id="createFolders" value="{{:settings.organize_options.dlc_folder}}">
                </div>
              </div>
              <div class="form-group row">
                <label for="createFolders" class="col-sm-2 col-form-label">Rename files</label>
                <div class="col-sm-10">
                  <input type="text" readonly class="form-control-plaintext" id="createFolders" value="{{:settings.organize_options.rename_files}}">
                </div>
              </div>
              <div class="form-group row">
                <label for="createFolders" class="col-sm-2 col-form-label">Delete empty folders</label>
                <div class="col-sm-10">
                  <input type="text" readonly class="form-control-plaintext" id="createFolders" value="{{:settings.organize_options.delete_empty_folders}}">
                </div>
              </div>
              <div class="form-group row">
                <label for="createFolders" class="col-sm-2 col-form-label">Delete old update files</label>
                <div class="col-sm-10">
                  <input type="text" readonly class="form-control-plaintext" id="createFolders" value="{{:settings.organize_options.delete_old_update_files}}">
                </div>
              </div>
              <div class="form-group row">
                <label for="createFolders" class="col-sm-2 col-form-label">Process files when base game is missing</label>
                <div class="col-sm-10">
                  <input type="text" readonly class="form-control-plaintext" id="createFolders" value="{{:settings.organize_options.process_when_missing_base_game}}">
                </div>
              </div>
              <div class="form-group row">
                <label for="createFolders" class="col-sm-2 col-form-label">Folder name template</label>
                <div class="col-sm-10">
                  <input type="text" readonly class="form-control-plaintext" id="createFolders" value="{{:settings.organize_options.folder_name_template}}">
                </div>
              </div>
              <div class="form-group row">
                <label for="createFolders" class="col-sm-2 col-form-label">File name template</label>
                <div class="col-sm-10">
                  <input type="text" readonly class="form-control-plaintext" id="createFolders" value="{{:settings.organize_options.file_name_template}}">
                </div>
              </div>
                 <button type="submit" class="btn btn-primary library-organize-action">Begin library organization</button>
            </div>
          </form>
       </div>

        {{else}}
            <div class="alert center alert-warning" role="alert">
                Local games folder is not set, please set the folder to get started
            </div>
            <div class="center">
                  <button type="button" class="btn btn-outline-primary folder-set">Set Folder</button>
            </div>
        {{/if}}
    </script>
  </body>
</html>
